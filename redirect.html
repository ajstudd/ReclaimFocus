<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting — Reclaim Focus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: oklch(45% 0.16 255);
      --primary-light: oklch(57% 0.14 252);
      --primary-soft: oklch(27% 0.055 252);
      --danger: oklch(50% 0.2 28);
      --warning: oklch(70% 0.15 72);

      --bg: oklch(16% 0.025 255);
      --bg-alt: oklch(19% 0.025 255);
      --card-bg: oklch(24% 0.026 255);
      --card-elevated: oklch(28% 0.026 255);
      --border: oklch(38% 0.03 255);
      --border-subtle: oklch(32% 0.028 255);

      --text: oklch(93% 0.012 255);
      --text-secondary: oklch(76% 0.018 255);
      --text-tertiary: oklch(60% 0.018 255);

      --shadow: 0 22px 56px rgba(0, 0, 0, 0.44);

      --accent: var(--primary);
      --accent-glow: oklch(45% 0.16 255 / 0.15);
      --countdown-duration: 4s;
    }

    body {
      background: linear-gradient(180deg, var(--bg), var(--bg-alt));
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.06); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 44px 40px 38px;
      max-width: 430px;
      width: 92vw;
      text-align: center;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: cardIn 450ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Progress bar */
    .progress-track {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--border-subtle);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--primary-light));
      width: 100%;
      border-radius: 0 2px 2px 0;
      animation: deplete var(--countdown-duration) linear forwards;
    }

    @keyframes deplete {
      from { width: 100%; }
      to   { width: 0%; }
    }

    /* Logo + icon area */
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .icon-badge {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--card-elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      animation: iconFloat 2.8s ease-in-out infinite;
    }

    .icon-badge img {
      width: 36px;
      height: 36px;
    }

    .icon-badge svg {
      width: 28px;
      height: 28px;
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }

    .reason-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border: 1px solid;
    }

    .reason-pill.blocked   { background: oklch(50% 0.2 28 / 0.12);   color: oklch(70% 0.16 28);   border-color: oklch(50% 0.2 28 / 0.25); }
    .reason-pill.keyword   { background: oklch(70% 0.15 72 / 0.12);  color: oklch(78% 0.12 72);   border-color: oklch(70% 0.15 72 / 0.25); }
    .reason-pill.cooldown  { background: oklch(50% 0.2 28 / 0.12);   color: oklch(70% 0.16 28);   border-color: oklch(50% 0.2 28 / 0.25); }
    .reason-pill.timelimit { background: oklch(45% 0.16 255 / 0.15); color: oklch(71% 0.12 252);  border-color: oklch(45% 0.16 255 / 0.25); }

    .reason-pill svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Typography */
    .title {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
      line-height: 1.3;
      color: var(--text);
    }

    .message {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 28px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .countdown {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 22px;
    }

    .countdown span {
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* Button */
    .continue-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 180ms cubic-bezier(0.22, 1, 0.36, 1);
      letter-spacing: 0.1px;
    }

    .continue-btn:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .continue-btn:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    .continue-btn svg {
      width: 15px;
      height: 15px;
      transition: transform 180ms;
    }

    .continue-btn:hover svg {
      transform: translateX(2px);
    }

    /* Meta info */
    .meta {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .meta-label {
      color: var(--text-tertiary);
      min-width: 36px;
      text-align: right;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.8px;
    }

    .meta-value {
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Branding */
    .branding {
      margin-top: 24px;
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-weight: 600;
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 30px; }
      .title { font-size: 18px; }
      .message { font-size: 13px; }
    }
  </style>
</head>
<body>

  <div class="glow" id="glow"></div>

  <div class="card">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="logo-area">
      <div class="icon-badge">
        <img src="icons/icon48.png" alt="Reclaim Focus">
      </div>
      <div class="reason-pill" id="reasonPill"></div>
    </div>

    <h1 class="title" id="title">Reclaim Focus Protected You</h1>
    <p class="message" id="message"></p>
    <p class="countdown" id="countdown">Redirecting in <span id="seconds">4</span> seconds…</p>

    <button class="continue-btn" id="continueBtn">
      Continue Now
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>

    <div class="meta" id="meta"></div>
    <div class="branding">Reclaim Focus</div>
  </div>

  <script src="redirect.js"></script>

</body>
</html>
